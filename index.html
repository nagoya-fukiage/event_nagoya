<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント管理システム(ナゴビュー)</title>
</head>  
<body>
  <script>
const url = "https://script.google.com/macros/s/AKfycbyQ0mg8nZlaMJU-VG42Kabg-QV8ihYADgP4hdiuvjXUSZnnVjuiijkhckUpcV-Pz1BrZA/exec";
const data = { name: "田中", email: "test@example.com" };

fetch(url, {
  method: "POST",
  <!-- mode: "no-cors", // 一時的な確認ならこれでも動きますが、レスポンスが取れません -->
  // 重要: Content-Typeを text/plain にするとプリフライト(OPTIONS)を回避できます
  headers: {
    'Content-Type': 'text/plain' 
  }
  body: JSON.stringify(data),
  mode:'cors'
})
.then(response => response.json())
.then(data => {
  console.log(data);
});
</script>
</body>
</html>
