<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント管理システム(ナゴビュー)</title>
</head>  
<body>
  <!-- ログイン/新規登録画面 -->
  <div id="auth">
    <h2>ログイン / 新規登録</h2>
    <input id="authEmail" type="email" placeholder="メールアドレス"><br>
    <input id="authPassword" type="password" placeholder="パスワード"><br>
    <button onclick="doRegister()">新規登録</button>
    <button onclick="login()">ログイン</button>
    <div id="authMsg"></div>
  </div>
  
  <script>

    const GAS_URL = "https://script.google.com/macros/s/AKfycbw65YGAd6_kNR_lNcbLbpsquNGa9JC00VY0IQaDpzLaj4ERweaoYY98NShwtYtvXF2A9w/exec";
    function doRegister()
    {
      fetchDoRegister();
    }

    function login()
    {
      fetchLogin();
    }
    
    //新規登録
    function fetchDoRegister()
    {
      const address = document.getElementById("authEmail").textContent;
      const pass = document.getElementById("authPassword").textContent;
      fetch(GAS_URL,
            {
              method:"POST",
              body:JSON.stringify
                (
                {
                  action:"register",
                  email:address,
                  password:pass
                }
                )
            }
           ).then(res => res.json()).then(console.log);
    }

    //ログイン
    function fetchLogin()
    {
      const address = document.getElementById("authEmail").textContent;
      const pass = document.getElementById("authPassword").textContent;
      fetch(GAS_URL,
            {
              method:"POST",
              body:JSON.stringify
                (
                {
                  action:"login",
                  email:address,
                  password:pass
                }
                )
            }
           ).then(res => res.json()).then
        (data => {
        if(data.success) 
        {
          localStorage.setItem("userId",data.userId);
        }  
      });
    }
