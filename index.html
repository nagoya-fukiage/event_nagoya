const url = "https://script.google.com/macros/s/AKfycbw65YGAd6_kNR_lNcbLbpsquNGa9JC00VY0IQaDpzLaj4ERweaoYY98NShwtYtvXF2A9w/exec";

// fetchの第二引数を省略すると自動的にGETになります
fetch(url)
  .then(response => {
    if (!response.ok) {
      throw new Error('ネットワークエラーが発生しました');
    }
    return response.json(); // JSONデータとして解析
  })
  .then(data => {
    console.log(data); // 取得したデータをコンソールに表示
  })
  .catch(error => {
    console.error('エラー:', error);
  });
